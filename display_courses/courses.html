<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CipherOps – Courses</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="icon" href="../logos/logo-icon.ico" />
</head>
<body>

  <button id="toggle-toc" aria-label="Toggle table of contents">☰</button>

  <button id="theme-toggle" aria-label="Toggle theme" data-active="light">
    <span class="toggle-icon dark-icon">☽</span>
    <span class="toggle-thumb"></span>
    <span class="toggle-icon light-icon">☀</span>
  </button>

  <nav id="toc" role="navigation" aria-label="Courses">
    <div id="sidebar-logo">
      <a href="../index.html">
        <img id="logo-light-img" src="../logos/logo-light.png" alt="CipherOps" />
        <img id="logo-dark-img"  src="../logos/logo-dark.png"  alt="CipherOps" />
      </a>
    </div>
  </nav>

  <main id="main-content">
    <div id="articles-landing">
      <h1 class="articles-page-title">Courses</h1>
      <p class="articles-page-description">
        Courses and study notes from my journey in cyberdefense.<br/>
        Covering cryptography, cybersecurity, networking, and related topics explored throughout my academic studies.
      </p>
    </div>

    <div id="article-layout" style="display:none;">
      <div id="article-container"></div>
      <nav id="article-toc" aria-label="On this page"></nav>
    </div>

    <footer id="contact-section">
      Contact: <a href="mailto:temporary.email@email.com">temporary.email@email.com</a>
      · GitHub: <a href="https://github.com/CipherOps-blog" target="_blank" rel="noopener">CipherOps-blog</a>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist/build/pdf.min.js"></script>
  <script>
    MathJax = { tex: { inlineMath: [['$','$']] }, startup: { typeset: false } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <script type="module">
    import { buildTOC } from './toc_courses.js';
    import { loadArticle, showLanding } from '../render.js';

    const toggle = document.getElementById('theme-toggle');
    const saved  = localStorage.getItem('theme') || 'light';
    if (saved === 'dark') document.body.classList.add('dark');
    toggle.dataset.active = saved;
    toggle.addEventListener('click', () => {
      const isDark = document.body.classList.toggle('dark');
      const next   = isDark ? 'dark' : 'light';
      toggle.dataset.active = next;
      localStorage.setItem('theme', next);
    });

    document.getElementById('toggle-toc').addEventListener('click', () => {
      document.getElementById('toc').classList.toggle('toc-open');
    });

    buildTOC();

    const route = () => {
      const hash = window.location.hash;
      if (hash.startsWith('#article=')) {
        const filePath = decodeURIComponent(hash.slice('#article='.length));
        loadArticle(filePath);
      } else {
        showLanding();
      }
    };

    window.addEventListener('hashchange', route);
    route();
  </script>
</body>
</html>
